<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Recuperar contraseña - SportClub</title>
    <link rel="stylesheet" href="estilos.css">
</head>
<body>

    <div class="contenedor">
        <header>
            <img src="logo.png" alt="Logo SportClub" class="logo">
        </header>

        <main>
            <h1>Recuperar contraseña</h1>

            <form>
                <label for="email">Correo electrónico</label>
                <input type="email" id="email" placeholder="Ingresa tu correo">

                <button type="submit">Recuperar contraseña</button>
            </form>

            <!-- Mensaje simulado -->
            <p style="margin-top: 15px; color: green; text-align: center;">
                Si el correo existe, se enviaron las instrucciones.
            </p>

            <div class="enlaces">
                <a href="index.html">Volver al inicio de sesión</a>
            </div>
        </main>
    </div>

</body>
</html>
