<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registro - SportClub</title>
    <link rel="stylesheet" href="estilos.css">
</head>
<body>

    <div class="contenedor contenedor-registro">
        <header>
            <img src="logo.png" alt="Logo SportClub" class="logo">
        </header>

        <main>
            <h1>Registro de usuario</h1>

            <form>
                <div class="form-columnas">
                    <div class="columna columna-izq">
                        <label for="nombre">Nombre</label>
                        <input type="text" id="nombre" placeholder="Tu nombre">

                        <label for="edad">Edad</label>
                        <input type="number" id="edad" min="1" placeholder="Tu edad">

                        <hr class="separador-horizontal">

                        <label for="deporte">¿Practica deporte?</label>
                        <select id="deporte">
                            <option value="">Seleccione una opción</option>
                            <option value="si">Sí</option>
                            <option value="no">No</option>
                        </select>

                        <label for="objetivo">Objetivo personal</label>
                        <input type="text" id="objetivo" placeholder="Ej. Bajar de peso">

                        <label for="nivel">Nivel</label>
                        <select id="nivel">
                            <option value="">Seleccione nivel</option>
                            <option value="principiante">Principiante</option>
                            <option value="intermedio">Intermedio</option>
                            <option value="avanzado">Avanzado</option>
                        </select>
                    </div>

                    <div class="columna columna-der">
                        <label for="email">Correo electrónico *</label>
                        <input type="email" id="email" required placeholder="ejemplo@mail.com">

                        <label for="password">Contraseña *</label>
                        <input type="password" id="password" required placeholder="Ingresa tu contraseña">

                        <label for="password_confirm">Repetir contraseña *</label>
                        <input type="password" id="password_confirm" required placeholder="Repite tu contraseña">
                    </div>
                </div>

                <button type="submit">Registrarse</button>
            </form>

            <div class="enlaces">
                <a href="index.html">Volver al inicio de sesión</a>
            </div>
        </main>
    </div>

</body>
</html>
